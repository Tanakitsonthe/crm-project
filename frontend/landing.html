<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM PRO - Landing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="landing-shell">
    <div class="crm-card landing-nav fade-up">
      <div class="landing-brand">
        <span class="brand-chip">CRM PRO</span>
        <span class="text-soft">SaaS CRM</span>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a href="#pricing" class="btn btn-outline-custom">Pricing</a>
        <a href="/" class="btn btn-main">Login</a>
      </div>
    </div>

    <section class="crm-card landing-hero fade-up">
      <div class="landing-copy">
        <div class="section-chip landing-kicker">CRM</div>
        <h1>ลูกค้า Billing Dashboard</h1>
        <p class="lead mb-4">ระบบเดียวสำหรับงานขายและการจัดการ</p>
        <div class="d-flex flex-wrap gap-2">
          <a href="/" class="btn btn-main">เริ่มใช้งาน</a>
          <a href="#pricing" class="btn btn-outline-custom">ดูราคา</a>
        </div>
      </div>

      <div class="landing-preview">
        <div class="hero-panel">
          <div class="mini-stat"><span>Free</span><strong>5</strong></div>
          <div class="mini-stat"><span>Pro</span><strong>Unlimited</strong></div>
          <div class="mini-stat"><span>Payment</span><strong>PromptPay</strong></div>
        </div>
      </div>
    </section>

    <div class="pricing-grid my-4">
      <div class="pricing-card fade-up">
        <div class="section-chip mb-3">Free</div>
        <div class="price">0</div>
        <p class="pricing-note">ทดลองใช้งาน 5 ลูกค้า</p>
      </div>

      <div class="pricing-card fade-up">
        <div class="section-chip mb-3">Pro</div>
        <div class="price">199</div>
        <p class="pricing-note">ลูกค้าไม่จำกัด</p>
      </div>
    </div>

    <section id="pricing" class="crm-card fade-up mb-4">
      <div class="section-head">
        <div>
          <h2 class="mb-1">Pricing</h2>
          <div class="text-soft small">เลือกแผนให้ตรงงาน</div>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2">
        <a href="/" class="btn btn-main">Login</a>
        <a href="/" class="btn btn-outline-custom">Open app</a>
      </div>
    </section>
  </div>
</body>
</html>

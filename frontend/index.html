<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ===== LOGIN ===== -->
<div id="auth" class="auth-center">
  <div class="auth-box">
    <h2>CRM PRO</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()" class="ghost">Register</button>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">CRM PRO</div>

    <nav>
      <button onclick="showPage('dashboard')">🏠 Dashboard</button>
      <button onclick="showPage('customers')">👥 Customers</button>
      <button onclick="showPage('billing')">💳 Billing</button>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div>
        <h3>Dashboard</h3>
        <span id="userLine"></span>
      </div>

      <div class="profile">
        ⋮
        <div class="dropdown">
          <button onclick="logout()">Logout</button>
        </div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <section id="dashboard" class="page active">

      <div class="cards">
        <div class="card">
          <p>Total</p>
          <h2 id="totalCount">0</h2>
        </div>

        <div class="card">
          <p>VIP</p>
          <h2 id="vipCount">0</h2>
        </div>

        <div class="card">
          <p>Remaining</p>
          <h2 id="remainingCount">0</h2>
        </div>
      </div>

      <div class="chart-box">
        <canvas id="tagChart"></canvas>
      </div>

    </section>

    <!-- CUSTOMERS -->
    <section id="customers" class="page">

      <div class="card form-card">
        <input id="name" placeholder="ชื่อ">
        <input id="phone" placeholder="เบอร์">
        <select id="tag">
          <option>New</option>
          <option>VIP</option>
          <option>Regular</option>
        </select>
        <button onclick="addCustomer()">Add</button>
      </div>

      <div class="card table-card">
        <input id="search" placeholder="Search...">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Tag</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="customers"></tbody>
        </table>
      </div>

    </section>

    <!-- BILLING -->
    <section id="billing" class="page">

      <div class="card payment">
        <h3>Upgrade PRO</h3>
        <img src="/qr.png">
        <button onclick="confirmPayment()">ฉันโอนแล้ว</button>
      </div>

    </section>

  </main>
</div>

<script src="/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>CRM PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: #0f172a;
  color: white;
}

.sidebar {
  width: 220px;
  height: 100vh;
  position: fixed;
  background: #020617;
  padding: 20px;
}

.main {
  margin-left: 240px;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.table {
  color: white;
}

.badge {
  padding: 6px 10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h4>🚀 CRM</h4>
  <hr>
  <p>Dashboard</p>
  <p>Customers</p>
</div>

<div class="main">

<h2>Dashboard</h2>

<div class="row mb-4">
  <div class="col">
    <div class="card">
      <h6>Total</h6>
      <h2 id="total">0</h2>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <h6>VIP</h6>
      <h2 id="vip">0</h2>
    </div>
  </div>
</div>

<div class="card mb-4">
  <canvas id="chart"></canvas>
</div>

<div class="card mb-4">
  <div class="row">
    <div class="col"><input id="name" class="form-control" placeholder="Name"></div>
    <div class="col"><input id="phone" class="form-control" placeholder="Phone"></div>
    <div class="col">
      <select id="tag" class="form-control">
        <option>New</option>
        <option>VIP</option>
        <option>Regular</option>
      </select>
    </div>
    <div class="col">
      <button onclick="addCustomer()" class="btn btn-primary w-100">Add</button>
    </div>
  </div>
</div>

<input id="search" class="form-control mb-3" placeholder="Search...">

<div class="card">
<table class="table">
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Tag</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="editModal">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-header">
<h5>Edit Customer</h5>
</div>
<div class="modal-body">
<input id="editName" class="form-control mb-2">
<input id="editPhone" class="form-control mb-2">
<select id="editTag" class="form-control">
<option>New</option>
<option>VIP</option>
<option>Regular</option>
</select>
</div>
<div class="modal-footer">
<button onclick="saveEdit()" class="btn btn-success">Save</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let token = localStorage.getItem("token") || "";
let editId = null;
let chart = null;

function login(){
  let u = prompt("user:");
  let p = prompt("pass:");

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:u,password:p})
  })
  .then(r=>r.json())
  .then(d=>{
    token=d.token;
    localStorage.setItem("token",token);
    loadAll();
  });
}

function addCustomer(){
  fetch("/customers",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      name:name.value,
      phone:phone.value,
      tag:tag.value
    })
  }).then(()=>loadAll());
}

function deleteCustomer(id){
  fetch("/customers/"+id,{
    method:"DELETE",
    headers:{ "Authorization":"Bearer "+token }
  }).then(()=>loadAll());
}

function openEdit(c){
  editId=c.id;
  editName.value=c.name;
  editPhone.value=c.phone;
  editTag.value=c.tag;

  new bootstrap.Modal(document.getElementById("editModal")).show();
}

function saveEdit(){
  fetch("/customers/"+editId,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      name:editName.value,
      phone:editPhone.value,
      tag:editTag.value
    })
  }).then(()=>loadAll());
}

function loadAll(){
  fetch("/customers",{
    headers:{ "Authorization":"Bearer "+token }
  })
  .then(r=>r.json())
  .then(data=>{

    let table=document.getElementById("table");
    table.innerHTML="";

    data.forEach(c=>{
      table.innerHTML+=`
      <tr>
        <td>${c.name}</td>
        <td>${c.phone}</td>
        <td><span class="badge bg-info">${c.tag}</span></td>
        <td>
          <button onclick='openEdit(${JSON.stringify(c)})' class="btn btn-warning btn-sm">Edit</button>
          <button onclick="deleteCustomer(${c.id})" class="btn btn-danger btn-sm">Delete</button>
        </td>
      </tr>`;
    });

    document.getElementById("total").innerText=data.length;
    document.getElementById("vip").innerText=data.filter(c=>c.tag=="VIP").length;

    loadChart(data);
  });
}

function loadChart(data){
  let counts = {New:0, VIP:0, Regular:0};
  data.forEach(c=>counts[c.tag]++);

  let ctx=document.getElementById("chart");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:["New","VIP","Regular"],
      datasets:[{
        data:[counts.New,counts.VIP,counts.Regular]
      }]
    }
  });
}

// SEARCH
document.getElementById("search").addEventListener("input",function(){
  let v=this.value.toLowerCase();
  document.querySelectorAll("#table tr").forEach(r=>{
    r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
  });
});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>CRM PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.auth-card {
  max-width:400px;
  margin:auto;
  margin-top:100px;
  padding:30px;
  background:#020617;
  border-radius:16px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div id="auth" class="auth-card">
<h3>🚀 CRM PRO</h3>

<input id="username" class="form-control mb-2" placeholder="Username">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button onclick="login()" class="btn btn-success w-100 mb-2">Login</button>
<button onclick="register()" class="btn btn-outline-light w-100">Register</button>
</div>

<div id="app" class="container hidden mt-4">

<h3>Dashboard</h3>
<h5 id="dashboard"></h5>

<button onclick="upgrade()" class="btn btn-warning mb-3">Upgrade PRO</button>

<div class="card p-3 mb-3">
<input id="name" class="form-control mb-2" placeholder="Name">
<input id="phone" class="form-control mb-2" placeholder="Phone">

<select id="tag" class="form-control mb-2">
<option>New</option>
<option>VIP</option>
<option>Regular</option>
</select>

<button onclick="addCustomer()" class="btn btn-primary">เพิ่มลูกค้า</button>
</div>

<ul id="customers"></ul>

<button onclick="logout()" class="btn btn-danger mt-3">Logout</button>

</div>

<script>

let token = localStorage.getItem("token") || "";

// AUTH
function register(){
  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:username.value,password:password.value})
  }).then(()=>alert("สมัครสำเร็จ"));
}

function login(){
  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:username.value,password:password.value})
  })
  .then(r=>r.json())
  .then(d=>{
    if(!d.token){ alert("Login fail"); return; }
    token=d.token;
    localStorage.setItem("token",token);
    showApp();
    loadAll();
  });
}

function logout(){
  localStorage.clear();
  location.reload();
}

// UI
function showApp(){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";
}

// CUSTOMER
function addCustomer(){
  fetch("/customers",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      name:name.value,
      phone:phone.value,
      tag:tag.value
    })
  })
  .then(res=>{
    if(res.status==403){
      alert("ต้องอัปเกรด PRO");
      return;
    }
    return res.json();
  })
  .then(()=>loadAll());
}

function loadAll(){
  fetch("/customers",{headers:{ "Authorization":"Bearer "+token}})
  .then(r=>r.json())
  .then(data=>{
    let list=document.getElementById("customers");
    list.innerHTML="";
    data.forEach(c=>{
      list.innerHTML+=`<li>${c.name} (${c.phone}) [${c.tag}]</li>`;
    });

    document.getElementById("dashboard").innerText="ลูกค้า: "+data.length;
  });
}

// UPGRADE
function upgrade(){
  fetch("/upgrade",{method:"POST",headers:{ "Authorization":"Bearer "+token}})
  .then(()=>alert("อัปเกรดสำเร็จ"));
}

// AUTO LOGIN
if(token){
  showApp();
  loadAll();
}

</script>

</body>
</html>
